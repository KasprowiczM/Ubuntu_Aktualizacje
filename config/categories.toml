# =============================================================================
# config/categories.toml — Update categories taxonomy (schema v1)
#
# Each category declares:
#   id              unique identifier (matches scripts/<id>/)
#   display_name    UI label
#   privilege       "user" | "sudo"
#   risk            "low" | "medium" | "high"
#   manual_confirm  true if dashboard must require explicit user approval
#   depends_on      ordered prerequisites (run before this category)
#   config_files    package SoT files
#   timeout_sec     hard wallclock cap for each phase
#   phases          subset of: check, plan, apply, verify, cleanup
# =============================================================================

[apt]
display_name   = "APT (Ubuntu base)"
privilege      = "sudo"
risk           = "high"
manual_confirm = false
depends_on     = []
config_files   = ["config/apt-packages.list", "config/apt-repos.list"]
timeout_sec    = 1800
phases         = ["check", "plan", "apply", "verify", "cleanup"]

[snap]
display_name   = "Snap"
privilege      = "sudo"
risk           = "medium"
manual_confirm = false
depends_on     = ["apt"]
config_files   = ["config/snap-packages.list"]
timeout_sec    = 900
phases         = ["check", "plan", "apply", "verify", "cleanup"]

[flatpak]
display_name   = "Flatpak"
privilege      = "user"
risk           = "low"
manual_confirm = false
depends_on     = ["apt"]
config_files   = ["config/flatpak-packages.list"]
timeout_sec    = 900
phases         = ["check", "plan", "apply", "verify", "cleanup"]

[brew]
display_name   = "Homebrew"
privilege      = "user"
risk           = "low"
manual_confirm = false
depends_on     = []
config_files   = ["config/brew-formulas.list", "config/brew-casks.list"]
timeout_sec    = 1800
phases         = ["check", "plan", "apply", "verify", "cleanup"]

[npm]
display_name   = "npm globals"
privilege      = "user"
risk           = "low"
manual_confirm = false
depends_on     = ["brew"]
config_files   = ["config/npm-globals.list"]
timeout_sec    = 900
phases         = ["check", "plan", "apply", "verify", "cleanup"]

[pip]
display_name   = "Python (pip + pipx)"
privilege      = "user"
risk           = "low"
manual_confirm = false
depends_on     = []
config_files   = ["config/pip-packages.list", "config/pipx-packages.list"]
timeout_sec    = 900
phases         = ["check", "plan", "apply", "verify", "cleanup"]

[drivers]
display_name   = "Drivers & firmware"
privilege      = "sudo"
risk           = "high"
manual_confirm = true
depends_on     = ["apt"]
config_files   = []
timeout_sec    = 1800
phases         = ["check", "plan", "apply", "verify", "cleanup"]

[inventory]
display_name   = "Inventory (APPS.md)"
privilege      = "user"
risk           = "low"
manual_confirm = false
depends_on     = ["apt", "snap", "brew", "npm", "pip", "flatpak"]
config_files   = []
timeout_sec    = 600
phases         = ["apply"]
