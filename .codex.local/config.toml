# Project-scoped Codex config for Ubuntu_Aktualizacje.
# Use via: CODEX_HOME=.codex.local codex ...

profile = "default"
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

# Keep tool outputs compact to reduce context/token burn.
tool_output_token_limit = 12000
model_auto_compact_token_limit = 64000
model_reasoning_summary = "concise"
hide_agent_reasoning = true
show_raw_agent_reasoning = false

# Keep subagent fan-out bounded.
[agents]
max_threads = 4
max_depth = 1

# App/connectors disabled by default for this repo (not required for local shell scripts).
[apps._default]
default_tools_enabled = false
open_world_enabled = false

[apps.github]
enabled = false

[apps.canva]
enabled = false

# No project MCP servers required.
[mcp_servers]

# Disable local project skills that are not needed for this repository's workflow.
[[skills.config]]
path = "./.claude/skills/bash-defensive-patterns"
enabled = false

[[skills.config]]
path = "./.claude/skills/bash-scripting"
enabled = false

[[skills.config]]
path = "./.claude/skills/docs-architect"
enabled = false

[[skills.config]]
path = "./.claude/skills/error-handling-patterns"
enabled = false

[[skills.config]]
path = "./.claude/skills/linux-shell-scripting"
enabled = false

[profiles.default]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[profiles.orchestrator]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.advisor]
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
approval_policy = "untrusted"

[profiles.worker-fast]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[profiles.worker-tests]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
