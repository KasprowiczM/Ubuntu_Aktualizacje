<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ascendo — wordmark + arc mark.
  Mark: ascending arc (chevron) inside a soft-edged square; symbolises
  "rising state" / "ascending versions". Pure SVG, no fonts required for
  the mark; the wordmark uses generic system sans (Inter/SF/Roboto fall back).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" role="img"
     aria-label="Ascendo">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Mark: rounded square + ascending arc -->
  <rect x="2" y="2" width="60" height="60" rx="14"
        fill="url(#ag)"/>
  <!-- Up-arrow / chevron -->
  <path d="M16 44 L32 22 L48 44" fill="none" stroke="white"
        stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="78" y="42" font-family="Inter, 'SF Pro', Roboto, sans-serif"
        font-size="32" font-weight="700" fill="#0f172a">Ascendo</text>
</svg>
