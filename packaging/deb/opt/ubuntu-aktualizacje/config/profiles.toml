# =============================================================================
# config/profiles.toml — Update profiles
#
# Each profile selects which categories run and which phases are executed.
# Used by lib/orchestrator.sh and update-all.sh --profile <name>.
# =============================================================================

[quick]
description = "Read-only sweep: check phase across all user-space categories"
phases      = ["check"]
categories  = ["apt", "snap", "flatpak", "brew", "npm", "pip"]

[safe]
description = "User-space + system base, no drivers/firmware"
phases      = ["check", "plan", "apply", "verify", "cleanup"]
categories  = ["apt", "snap", "flatpak", "brew", "npm", "pip", "inventory"]

[full]
description = "Everything except release-upgrade"
phases      = ["check", "plan", "apply", "verify", "cleanup"]
categories  = ["apt", "snap", "flatpak", "brew", "npm", "pip", "drivers", "inventory"]
require_approval_for = ["drivers"]
