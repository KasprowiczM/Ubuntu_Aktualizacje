name: Validate Config

on:
  push:
    branches: [ main ]
    paths:
      - 'config/**'
      - 'scripts/**'
      - 'lib/**'
      - 'setup.sh'
      - 'update-all.sh'
      - 'dev-sync/**'
      - 'dev-sync-*.sh'
      - 'systemd/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]

jobs:
  validate-configs:
    name: Validate config files
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check config file syntax
        run: |
          echo "── Checking config files ──"
          errors=0

          for f in config/*.list; do
            # Check for lines that aren't comments, blank, or valid package names
            invalid=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$|^[a-zA-Z0-9@._/-]+' "$f" 2>/dev/null || true)
            if [[ -n "$invalid" ]]; then
              echo "❌ Invalid lines in $f:"
              echo "$invalid"
              errors=$((errors + 1))
            else
              count=$(grep -cvE '^[[:space:]]*#|^[[:space:]]*$' "$f" 2>/dev/null || echo 0)
              echo "✔  $f ($count packages)"
            fi
          done

          [[ $errors -eq 0 ]] && echo "" && echo "All config files valid." || exit 1

      - name: Check shell script syntax
        run: |
          echo "── Checking shell scripts ──"
          errors=0

          find . -name "*.sh" -not -path "./.git/*" | sort | while read -r script; do
            if bash -n "$script" 2>&1; then
              echo "✔  $script"
            else
              echo "❌ Syntax error in $script"
              errors=$((errors + 1))
            fi
          done

          # Re-check for exit code (subshell above hides errors)
          bash_errors=$(find . -name "*.sh" -not -path "./.git/*" -exec bash -n {} \; 2>&1 | wc -l)
          [[ "$bash_errors" -eq 0 ]] || { echo "Shell syntax errors found!"; exit 1; }

      - name: Check required files exist
        run: |
          echo "── Checking required files ──"
          required=(
            "update-all.sh"
            "setup.sh"
            "lib/common.sh"
            "lib/detect.sh"
            "lib/repos.sh"
            "scripts/update-apt.sh"
            "scripts/update-snap.sh"
            "scripts/update-brew.sh"
            "scripts/update-npm.sh"
            "scripts/update-pip.sh"
            "scripts/update-flatpak.sh"
            "scripts/update-drivers.sh"
            "scripts/update-inventory.sh"
            "scripts/rebuild-dkms.sh"
            "scripts/notify.sh"
            "scripts/preflight.sh"
            "scripts/bootstrap.sh"
            "scripts/restore-from-proton.sh"
            "scripts/verify-state.sh"
            "systemd/install-timer.sh"
            "systemd/ubuntu-aktualizacje@.service"
            "systemd/ubuntu-aktualizacje@.timer"
            "dev-sync/dev_sync_core.py"
            "dev-sync/provider_setup.sh"
            "dev-sync/dev-sync-export.sh"
            "dev-sync/dev-sync-import.sh"
            "dev-sync/dev-sync-restore-preflight.sh"
            "dev-sync/dev-sync-verify-full.sh"
            "dev-sync/dev-sync-verify-git.sh"
            "dev-sync/dev-sync-prune-excluded.sh"
            "dev-sync/dev-sync-purge-quarantine.sh"
            "dev-sync/dev-sync-proton-status.sh"
            "dev-sync-export.sh"
            "dev-sync-import.sh"
            "dev-sync-restore-preflight.sh"
            "dev-sync-verify-full.sh"
            "dev-sync-verify-git.sh"
            "dev-sync-prune-excluded.sh"
            "dev-sync-purge-quarantine.sh"
            "dev-sync-proton-status.sh"
            "tests/test_dev_sync_safety.py"
            "tests/validate_phase_json.py"
            "tests/python/test_frontend.py"
            "tests/bash/test_json_emit.bats"
            "tests/bash/test_orchestrator.bats"
            "tests/bash/test_phase_contract.bats"
            "config/apt-packages.list"
            "config/apt-repos.list"
            "config/dev-sync-excludes.txt"
            "config/restore-manifest.json"
            "config/snap-packages.list"
            "config/brew-formulas.list"
            "config/brew-casks.list"
            "config/npm-globals.list"
            "config/pip-packages.list"
            "config/pipx-packages.list"
            "config/flatpak-packages.list"
            "config/categories.toml"
            "config/profiles.toml"
            "schemas/phase-result.schema.json"
            "lib/json.sh"
            "lib/_json_emit.py"
            "lib/orchestrator.sh"
            "scripts/apt/check.sh"
            "scripts/apt/plan.sh"
            "scripts/apt/apply.sh"
            "scripts/apt/verify.sh"
            "scripts/apt/cleanup.sh"
            "scripts/snap/check.sh"
            "scripts/snap/plan.sh"
            "scripts/snap/apply.sh"
            "scripts/snap/verify.sh"
            "scripts/snap/cleanup.sh"
            "scripts/brew/check.sh"
            "scripts/brew/plan.sh"
            "scripts/brew/apply.sh"
            "scripts/brew/verify.sh"
            "scripts/brew/cleanup.sh"
            "scripts/npm/check.sh"
            "scripts/npm/plan.sh"
            "scripts/npm/apply.sh"
            "scripts/npm/verify.sh"
            "scripts/npm/cleanup.sh"
            "scripts/pip/check.sh"
            "scripts/pip/plan.sh"
            "scripts/pip/apply.sh"
            "scripts/pip/verify.sh"
            "scripts/pip/cleanup.sh"
            "scripts/flatpak/check.sh"
            "scripts/flatpak/plan.sh"
            "scripts/flatpak/apply.sh"
            "scripts/flatpak/verify.sh"
            "scripts/flatpak/cleanup.sh"
            "scripts/drivers/check.sh"
            "scripts/drivers/plan.sh"
            "scripts/drivers/apply.sh"
            "scripts/drivers/verify.sh"
            "scripts/inventory/apply.sh"
            "scripts/drivers/cleanup.sh"
            "scripts/secrets/migrate-to-libsecret.sh"
            "lib/secrets.sh"
            "lib/host_profile.sh"
            "config/host-profiles/README.md"
            "app/backend/migrations.py"
            "app/backend/settings.py"
            "app/install.sh"
            "docs/agents/hybrid-mode.md"
            "scripts/fresh-machine.sh"
            "scripts/maintenance/prune-logs.sh"
            "scripts/snapshot/restore.sh"
            "app/backend/audit.py"
            "app/backend/auth.py"
            "app/backend/metrics.py"
            "app/backend/report.py"
            "app/backend/diff.py"
            "packaging/build-deb.sh"
            "packaging/deb/DEBIAN/control"
            "packaging/deb/DEBIAN/postinst"
            "packaging/deb/DEBIAN/prerm"
            "packaging/deb/usr/bin/ubuntu-aktualizacje"
            "scripts/snapshot/create.sh"
            "scripts/snapshot/list.sh"
            "scripts/scheduler/install.sh"
            "lib/plugins.sh"
            "plugins/example/manifest.toml"
            "plugins/example/check.sh"
            "plugins/example/apply.sh"
            "app/backend/__init__.py"
            "app/backend/__main__.py"
            "app/backend/main.py"
            "app/backend/runner.py"
            "app/backend/db.py"
            "app/backend/config.py"
            "app/frontend/index.html"
            "app/frontend/style.css"
            "app/frontend/app.js"
            "app/pyproject.toml"
            "app/README.md"
            "systemd/user/ubuntu-aktualizacje-dashboard.service"
            "systemd/user/install-dashboard.sh"
            "share/applications/ubuntu-aktualizacje.desktop"
            "docs/agents/contract.md"
            "APPS.md.example"
            "README.md"
          )

          missing=0
          for f in "${required[@]}"; do
            if [[ -f "$f" ]]; then
              echo "✔  $f"
            else
              echo "❌ MISSING: $f"
              missing=$((missing + 1))
            fi
          done

          [[ $missing -eq 0 ]] || { echo "$missing required files missing!"; exit 1; }

      - name: Check APPS.md is gitignored
        run: |
          if git check-ignore -q APPS.md 2>/dev/null; then
            echo "✔  APPS.md is gitignored (correct)"
          else
            echo "❌ APPS.md is NOT gitignored — machine-specific inventory must not be committed"
            exit 1
          fi

      - name: Check dev-sync runtime files are gitignored
        run: |
          required_ignored=(
            ".dev_sync_config.json"
            ".dev_sync_manifest.json"
            "dev_sync_logs/test.log"
            "dev_sync_quarantine/test"
            "dev_sync_cleanup_plan.json"
            ".sync-state/protondrive/last_verified.json"
            ".codex.local/tmp/runtime-file"
          )
          for path in "${required_ignored[@]}"; do
            if git check-ignore -q "$path" 2>/dev/null; then
              echo "✔  $path is gitignored"
            else
              echo "❌ $path is NOT gitignored"
              exit 1
            fi
          done

      - name: Check no secrets in tracked files
        run: |
          echo "── Checking for leaked secrets ──"
          # Patterns that should never appear in tracked files
          if git grep -lE 'BEGIN[[:space:]]+(RSA|OPENSSH|PRIVATE)[[:space:]]+KEY|(ghp_|github_pat_|glpat-|xox[baprs]-|AKIA[0-9A-Z]{16}|refresh_token|client_secret|token[[:space:]]*=)[A-Za-z0-9]' -- 2>/dev/null; then
            echo "❌ Potential GitHub/GitLab tokens found in tracked files!"
            exit 1
          else
            echo "✔  No obvious tokens found"
          fi

      - name: Dev-sync Python tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 python3 tests/test_dev_sync_safety.py -v

      - name: Phase JSON contract — emitter smoke test + schema validation
        run: |
          set -euo pipefail
          # 1. Generate a synthetic phase sidecar via lib/json.sh
          tmpdir="$(mktemp -d)"
          out="$tmpdir/phase.json"
          JSON_OUT="$out" bash -c '
            source lib/json.sh
            json_init check apt
            json_register_exit_trap "$JSON_OUT"
            json_count_ok
            json_add_item id=ci:smoke action=present result=ok
            json_add_diag info CI-SMOKE "ci synthesised sidecar"
          '
          test -f "$out"
          # 2. Validate against schema
          python3 tests/validate_phase_json.py "$out"
          # 3. Run apt:check phase (read-only) and validate its sidecar too
          mkdir -p "$tmpdir/runs"
          JSON_OUT="$tmpdir/runs/apt-check.json" \
            LOG_FILE="$tmpdir/runs/apt-check.log" \
            bash scripts/apt/check.sh || true
          test -f "$tmpdir/runs/apt-check.json"
          python3 tests/validate_phase_json.py "$tmpdir/runs/apt-check.json"

      - name: shellcheck — all .sh files
        # Catches subtle shell bugs (unquoted vars, [[ vs [, $? after pipe,
        # etc.) that `bash -n` can't see. Severity gate at "warning" so we
        # don't fail on stylistic info notes. SC1090/SC1091 ignored: every
        # phase script `source`s lib/*.sh by absolute path which shellcheck
        # can't follow without --external-sources.
        run: |
          sudo apt-get install -y -q shellcheck
          set +e
          fail=0
          while IFS= read -r f; do
            shellcheck --severity=warning --exclude=SC1090,SC1091,SC2086 "$f" || fail=$((fail+1))
          done < <(find . -name '*.sh' -not -path './.git/*' -not -path './app/.venv/*' \
                          -not -path './app/tauri/src-tauri/target/*' | sort)
          if [[ $fail -gt 0 ]]; then
            echo "❌ shellcheck reported $fail file(s) with warnings"
            exit 1
          fi
          echo "✔ shellcheck clean"

      - name: bats — emitter, orchestrator, phase contract
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q bats
          bats tests/bash/test_json_emit.bats
          bats tests/bash/test_orchestrator.bats
          bats tests/bash/test_phase_contract.bats

      - name: dev-sync overlay size guard (≤ 50 files)
        # The private overlay should contain ONLY user-secret files (.env.local,
        # ssh keys, agent settings). If a future build artifact slips through
        # the .gitignore + DEFAULT_EXCLUDE_PATTERNS net, the export count
        # explodes silently — caught it once at 3527 files (Cargo target/).
        # 50 is a generous cap; current overlay is ~8 files.
        run: |
          # Seed minimum config so dry-run can resolve provider path.
          if [[ ! -f .dev_sync_config.json ]]; then
            cat > .dev_sync_config.json <<'JSON'
          {
            "project_name": "Ubuntu_Aktualizacje",
            "provider": "protondrive",
            "provider_path": "/tmp/_ci_proton",
            "rclone_remote": "",
            "rclone_remote_path": "",
            "proton_project_root": "/tmp/_ci_proton/Ubuntu_Aktualizacje",
            "exclude_patterns": [],
            "include_always": []
          }
          JSON
            mkdir -p /tmp/_ci_proton/Ubuntu_Aktualizacje
          fi
          count=$(python3 dev-sync/dev_sync_export.py --dry-run 2>&1 | awk -F': ' '/^Files selected:/ {print $2}')
          echo "overlay file count: ${count:-?}"
          if [[ -z "$count" ]]; then
            echo "❌ could not parse file count from dev_sync_export"; exit 1
          fi
          if [[ "$count" -gt 50 ]]; then
            echo "❌ overlay bloat: $count > 50 — review DEFAULT_EXCLUDE_PATTERNS in dev-sync/dev_sync_core.py"
            exit 1
          fi
          echo "✔ overlay within bounds ($count ≤ 50)"

      - name: Plugin manifest scanner smoke test
        run: |
          source lib/plugins.sh
          ids=$(plugins_list_ids | tr '\n' ' ')
          test -n "$ids"
          for id in $ids; do plugins_validate "$id"; done
          echo "plugins ok: $ids"

      - name: Dashboard backend + frontend smoke test
        run: |
          python3 -m pip install --quiet fastapi uvicorn pydantic httpx
          python3 tests/python/test_frontend.py

      - name: DB migrations smoke test
        run: |
          python3 -m pip install --quiet fastapi pydantic   # for app.backend imports
          python3 - <<'PY'
          import sys, sqlite3, tempfile, pathlib
          sys.path.insert(0, '.')
          from app.backend import db, migrations
          tmp = pathlib.Path(tempfile.mkdtemp()) / 'mig.db'
          db.init_db(tmp)
          with sqlite3.connect(tmp) as c:
              ver = migrations.current_version(c)
              cols = {r[1] for r in c.execute('PRAGMA table_info(runs)')}
          assert ver == len(migrations.MIGRATIONS), f'unexpected version {ver}'
          assert {'snapshot_id', 'label'} <= cols, f'missing columns: {cols}'
          # idempotency
          db.init_db(tmp)
          print(f'migrations: {ver} applied, idempotent re-init ok')
          PY

      - name: Secrets API smoke test (env-fallback path)
        run: |
          set -e
          tmp=$(mktemp)
          SECRETS_ENV_FILE="$tmp" bash -c '
            source lib/secrets.sh
            secrets_set FOO_TOKEN "secret value"
            v=$(secrets_get FOO_TOKEN)
            test "$v" = "secret value" || { echo "fail: got [$v]"; exit 1; }
            secrets_has FOO_TOKEN
            secrets_list | grep -q FOO_TOKEN
          '
          rm -f "$tmp"
          echo "  secrets API ok (env fallback)"

      - name: Host profile resolver smoke test
        run: |
          set -e
          T=$(mktemp -d)
          mkdir -p "$T/config/host-profiles/h1" "$T/lib"
          cp lib/host_profile.sh "$T/lib/"
          printf 'a\nb\nc\n' > "$T/config/foo.list"
          printf 'd\n-b\n' > "$T/config/host-profiles/h1/foo.list"
          out=$(SCRIPT_DIR="$T" HOSTNAME=h1 bash -c 'source lib/host_profile.sh; host_profile_resolve foo.list' | tr "\n" " ")
          echo "  resolved: $out"
          test "$out" = "a c d " || { echo "FAIL"; exit 1; }
          # No-overlay falls through
          out2=$(SCRIPT_DIR="$T" HOSTNAME=other bash -c 'source lib/host_profile.sh; host_profile_resolve foo.list' | tr "\n" " ")
          test "$out2" = "a b c " || { echo "FAIL fallback"; exit 1; }
          rm -rf "$T"
          echo "  host_profile_resolve ok"

  check-readme:
    name: README completeness
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Check README sections
        run: |
          required_sections=(
            "## Overview"
            "## Quick Start"
            "## What Gets Updated"
            "## Migration"
            "## Git & GitHub"
          )
          missing=0
          for section in "${required_sections[@]}"; do
            if grep -q "$section" README.md 2>/dev/null; then
              echo "✔  Found: $section"
            else
              echo "⚠  Missing section: $section"
              missing=$((missing + 1))
            fi
          done
          # Warn but don't fail on README sections
          echo "README check complete ($missing sections missing — non-blocking)"
